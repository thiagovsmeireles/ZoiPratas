services:
  - type: web
    name: zoi-pratas
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: zoi-pratas-data
      mountPath: /var/data
      sizeGB: 1
